global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: ev-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ev-gateway:8080"]
  - job_name: ev-service-identity
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ev-service-identity:8081"]
  - job_name: ev-service-station
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ev-service-station:8082"]
  - job_name: ev-service-order
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ev-service-order:8083"]
  - job_name: ev-service-charging
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ev-service-charging:8084"]
  - job_name: ev-service-simulator
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["ev-service-simulator:8085"]
