version: "3.8"

services:

  # ==================== 基础设施 ====================

  postgres:
    image: postgres:16-alpine
    container_name: ev-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ev
      POSTGRES_PASSWORD: ev123
      POSTGRES_DB: ev_identity
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ev"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ev-network

  redis:
    image: redis:7-alpine
    container_name: ev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ev-network

  nacos:
    image: docker.m.daocloud.io/nacos/nacos-server:v2.3.2
    container_name: ev-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: ""
      JVM_XMS: 256m
      JVM_XMX: 256m
      JVM_XMN: 128m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ev-network

  minio:
    image: docker.m.daocloud.io/minio/minio:latest
    container_name: ev-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ev-network

  # ==================== Kafka (ZooKeeper 模式) ====================
  zookeeper:
    image: docker.m.daocloud.io/confluentinc/cp-zookeeper:7.6.0
    container_name: ev-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ev-network

  kafka:
    image: docker.m.daocloud.io/confluentinc/cp-kafka:7.6.0
    container_name: ev-kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ev-network

  # ==================== 后端微服务 ====================

  ev-gateway:
    build:
      context: ../backend
      dockerfile: ev-gateway/Dockerfile
    container_name: ev-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ev-network

  ev-service-identity:
    build:
      context: ../backend
      dockerfile: ev-service/ev-service-identity/Dockerfile
    container_name: ev-identity
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ev_identity
      SPRING_DATASOURCE_USERNAME: ev
      SPRING_DATASOURCE_PASSWORD: ev123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ev-network

  ev-service-station:
    build:
      context: ../backend
      dockerfile: ev-service/ev-service-station/Dockerfile
    container_name: ev-station
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ev_station
      SPRING_DATASOURCE_USERNAME: ev
      SPRING_DATASOURCE_PASSWORD: ev123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ev-network

  ev-service-order:
    build:
      context: ../backend
      dockerfile: ev-service/ev-service-order/Dockerfile
    container_name: ev-order
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ev_order
      SPRING_DATASOURCE_USERNAME: ev
      SPRING_DATASOURCE_PASSWORD: ev123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ev-network

  ev-service-charging:
    build:
      context: ../backend
      dockerfile: ev-service/ev-service-charging/Dockerfile
    container_name: ev-charging
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ev_order
      SPRING_DATASOURCE_USERNAME: ev
      SPRING_DATASOURCE_PASSWORD: ev123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ev-network

  ev-service-simulator:
    build:
      context: ../backend
      dockerfile: ev-service/ev-service-simulator/Dockerfile
    container_name: ev-simulator
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER_ADDR: nacos:8848
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
      nacos:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ev-network

volumes:
  pg-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local

networks:
  ev-network:
    driver: bridge
