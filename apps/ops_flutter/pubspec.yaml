name: ops_flutter
description: "EV充电平台 - 运维端 Flutter App"
publish_to: 'none'
version: 0.1.0+100

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.70.2
  flutter_slidable: ^3.1.1
  pull_to_refresh: ^2.0.0
  flutter_easyloading: ^3.0.5
  flutter_screenutil: ^5.9.3

  # State Management
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Navigation
  go_router: ^14.8.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  package_info_plus: ^8.1.3

  # QR Code
  mobile_scanner: ^5.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
