server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: ev-gateway

  # WebFlux 请求体大小限制（5MB，支持头像上传）
  # spring.servlet.multipart 不适用于 WebFlux，使用 codec 替代
  codec:
    max-in-memory-size: 5MB

  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            # 明确列出合法前端源，不使用通配符
            allowed-origins:
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "http://localhost:5176"
              - "http://localhost:5177"
            # 允许 credentials 时不能用 *，需显式列出方法
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowed-headers:
              - Authorization
              - Content-Type
              - X-Requested-With
              - Accept
              - Origin
              - X-Token
              - Idempotency-Key
            exposed-headers:
              - X-Request-Id
            allow-credentials: true
            max-age: 3600
      routes:
        - id: identity-service
          uri: lb://ev-service-identity
          predicates:
            - Path=/api/auth/**,/api/v1/auth/**,/api/v1/ops/auth/**,/api/v1/ops/user/**,/api/v1/user/**,/api/users/**,/uploads/**
        - id: station-service
          uri: lb://ev-service-station
          predicates:
            - Path=/api/stations/**,/api/v1/stations/**,/api/v1/ops/stations/**,/api/devices/**,/internal/**,/api/v1/stations/upload/**
        - id: order-service
          uri: lb://ev-service-order
          predicates:
            - Path=/api/orders/**,/api/v1/orders/**,/api/dashboard/**,/api/finance/**,/api/v1/ops/alerts/**,/api/v1/ops/workorders/**,/api/v1/ops/inspections/**,/ws/dashboard/**,/api/v1/upload/**
        - id: charging-service
          uri: lb://ev-service-charging
          predicates:
            - Path=/api/v1/charging/**,/ws/charging/**
        - id: simulator-service
          uri: lb://ev-service-simulator
          predicates:
            - Path=/api/simulator/**
        - id: simulator-service-ws-ui
          uri: lb:ws://ev-service-simulator
          predicates:
            - Path=/ws/ocpp
        - id: simulator-service-ws-cp
          uri: lb:ws://ev-service-simulator
          predicates:
            - Path=/ws/cp/**
        # Knife4j / SpringDoc API 文档路由
        - id: identity-docs
          uri: lb://ev-service-identity
          predicates:
            - Path=/doc/identity/**
          filters:
            - StripPrefix=1
        - id: station-docs
          uri: lb://ev-service-station
          predicates:
            - Path=/doc/station/**
          filters:
            - StripPrefix=1
        - id: order-docs
          uri: lb://ev-service-order
          predicates:
            - Path=/doc/order/**
          filters:
            - StripPrefix=1
        - id: charging-docs
          uri: lb://ev-service-charging
          predicates:
            - Path=/doc/charging/**
          filters:
            - StripPrefix=1
        - id: simulator-docs
          uri: lb://ev-service-simulator
          predicates:
            - Path=/doc/simulator/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:ev-charging-platform-jwt-dev-secret-key-2026}

# 管理端点 — 仅暴露 health/info，限制敏感端点（I-003）
management:
  endpoints:
    web:
      exposure:
        # 仅暴露 health 和 info，不暴露 env/beans/configprops 等敏感端点
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
