server:
  port: 8082
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ev-service-station
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 0
      properties:
        max.block.ms: 3000
        request.timeout.ms: 3000
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/ev_station?currentSchema=public&loggerLevel=TRACE&characterEncoding=UTF-8
    username: ${DB_USER:ev}
    password: ${DB_PASS:ev123}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}
