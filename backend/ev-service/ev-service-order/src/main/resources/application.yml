server:
  port: 8083
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ev-service-order
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 0
      properties:
        max.block.ms: 3000
        request.timeout.ms: 3000
    consumer:
      group-id: ev-order-service
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.ev.common.core.event"
  cloud:
    stream:
      kafka:
        binder:
          brokers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/ev_order?currentSchema=public&characterEncoding=UTF-8
    username: ${DB_USER:ev}
    password: ${DB_PASS:ev123}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: ${spring.application.name}

# Knife4j / SpringDoc
springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 订单管理
      paths-to-match: /api/orders/**, /api/v1/orders/**
    - group: 财务管理
      paths-to-match: /api/finance/**, /api/v1/finance/**
    - group: 仪表盘
      paths-to-match: /api/dashboard/**
    - group: 告警管理
      paths-to-match: /api/alerts/**, /api/v1/alerts/**
    - group: 工单管理
      paths-to-match: /api/workorders/**, /api/v1/workorders/**
    - group: 巡检管理
      paths-to-match: /api/inspections/**, /api/v1/inspections/**

# MinIO 配置
minio:
  endpoint: http://${MINIO_HOST:localhost}:9000
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-name: ev-charging
  enabled: true
