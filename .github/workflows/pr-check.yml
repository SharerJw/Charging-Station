name: PR Check

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ============================================================
  # Backend Build & Test
  # ============================================================
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ev_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build backend (skip tests)
        working-directory: backend
        run: ./gradlew build -x test --no-daemon --warning-mode all

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test --no-daemon --warning-mode all
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ev_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-backend-test-reports
          path: |
            backend/**/build/reports/tests/
            backend/**/build/reports/jacoco/
          retention-days: 5
          if-no-files-found: ignore

  # ============================================================
  # Frontend Build (matrix strategy)
  # ============================================================
  frontend-build:
    name: Frontend Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        app:
          - admin-web
          - ops-app
          - user-miniapp
          - simulator-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ runner.os }}-${{ matrix.app }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ matrix.app }}-
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} run build

      - name: Test ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} run test --if-present
        continue-on-error: true

  # ============================================================
  # PR Summary Status
  # ============================================================
  pr-check-status:
    name: PR Check Status
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: always()
    steps:
      - name: Verify all checks passed
        run: |
          if [ "${{ needs.backend-build.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "PR check failed"
            echo ""
            echo "Results:"
            echo "  Backend Build:  ${{ needs.backend-build.result }}"
            echo "  Frontend Build: ${{ needs.frontend-build.result }}"
            exit 1
          fi
          echo "All PR checks passed"
