name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['apps/**']
  pull_request:
    branches: [main]
    paths: ['apps/**']

jobs:
  build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [admin-web, user-miniapp, ops-app, simulator-web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: apps/${{ matrix.app }}

      - name: Build
        run: pnpm run build
        working-directory: apps/${{ matrix.app }}

      - name: Run tests
        run: pnpm test -- --passWithNoTests
        working-directory: apps/${{ matrix.app }}
