name: Frontend CI

on:
  push:
    branches: [main]
    paths: ['apps/**']
  pull_request:
    branches: [main]
    paths: ['apps/**']

jobs:
  build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build user-miniapp
        run: pnpm --filter user-miniapp run build

      - name: Build admin-web
        run: pnpm --filter admin-web run build

      - name: Build ops-app
        run: pnpm --filter ops-app run build
