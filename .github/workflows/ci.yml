name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  PNPM_VERSION: '9'

jobs:
  # ============================================================
  # Job 1: Backend Build & Test
  # ============================================================
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ev_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Build backend (skip tests)
        working-directory: backend
        run: ./gradlew build -x test --no-daemon --warning-mode all

      - name: Run backend tests
        working-directory: backend
        run: ./gradlew test --no-daemon --warning-mode all
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ev_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/**/build/reports/tests/
            backend/**/build/reports/jacoco/
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # Job 2: Frontend Build (matrix strategy)
  # ============================================================
  frontend-build:
    name: Frontend Build (${{ matrix.app }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        app:
          - admin-web
          - ops-app
          - user-miniapp
          - simulator-web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store/v10
          key: pnpm-${{ runner.os }}-${{ matrix.app }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-${{ matrix.app }}-
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} run build

      - name: Test ${{ matrix.app }}
        run: pnpm --filter ${{ matrix.app }} run test --if-present
        continue-on-error: true

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-${{ matrix.app }}-dist
          path: apps/${{ matrix.app }}/dist
          retention-days: 3
          if-no-files-found: ignore

  # ============================================================
  # Job 3: Docker Build Verification (main push only)
  # ============================================================
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        service:
          - ev-gateway
          - ev-service-identity
          - ev-service-station
          - ev-service-charging
          - ev-service-order
          - ev-service-simulator

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine build context
        id: context
        run: |
          if [ "${{ matrix.service }}" = "ev-gateway" ]; then
            echo "path=./backend/ev-gateway" >> $GITHUB_OUTPUT
          else
            echo "path=./backend/ev-service/${{ matrix.service }}" >> $GITHUB_OUTPUT
          fi

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ steps.context.outputs.path }}
          push: false
          load: false
          tags: ev-charging/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # ============================================================
  # Job 4: Code Quality Checks
  # ============================================================
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Run Checkstyle
        working-directory: backend
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon --continue || true
        continue-on-error: true

      - name: Run SpotBugs
        working-directory: backend
        run: ./gradlew spotbugsMain --no-daemon --continue || true
        continue-on-error: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend packages
        run: pnpm -r run lint --if-present
        continue-on-error: true

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-reports
          path: |
            backend/**/build/reports/checkstyle/
            backend/**/build/reports/spotbugs/
          retention-days: 7
          if-no-files-found: ignore

  # ============================================================
  # Status Check (all jobs must pass)
  # ============================================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, code-quality]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.backend-build.result }}" != "success" ] || \
             [ "${{ needs.frontend-build.result }}" != "success" ] || \
             [ "${{ needs.code-quality.result }}" != "success" ]; then
            echo "One or more jobs failed"
            exit 1
          fi
          echo "All jobs passed"
